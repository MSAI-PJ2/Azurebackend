# 로컬 api-gateway compose. 리포지토리 루트에서:
#   docker compose -f gateway-container/docker-compose.yml up --build api-gateway
# Azure 서비스 키는 .env 로 전달한다 (.env.example 참고).
services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: mlnode-api-gateway
    environment:
      KLUE_API_URL: ${KLUE_API_URL:-http://host.docker.internal:8000}
      API_KEY_REQUIRED: ${API_KEY_REQUIRED:-false}
      API_KEY: ${API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_SEARCH_ENDPOINT: ${AZURE_SEARCH_ENDPOINT:-}
      AZURE_SEARCH_API_KEY: ${AZURE_SEARCH_API_KEY:-}
      AZURE_SEARCH_INDEX: ${AZURE_SEARCH_INDEX:-}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      CONTENT_SAFETY_ENABLED: ${CONTENT_SAFETY_ENABLED:-false}
      CONTENT_SAFETY_ENDPOINT: ${CONTENT_SAFETY_ENDPOINT:-}
      CONTENT_SAFETY_KEY: ${CONTENT_SAFETY_KEY:-}
      SESSION_REPOSITORY: ${SESSION_REPOSITORY:-memory}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
